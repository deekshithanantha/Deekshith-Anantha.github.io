<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internship Tracker - Smart Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .search-container {
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
        }
        .checked-today {
            border-color: #10b981 !important;
            background: #f0fdf4 !important;
        }
        /* Modal styles */
        #addModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }
        #addModal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Header Section -->
    <div class="search-container text-white py-12 px-6 relative overflow-hidden">
        <div class="absolute top-0 left-0 w-full h-full opacity-10 pointer-events-none">
            <svg viewBox="0 0 100 100" preserveAspectRatio="none" class="w-full h-full">
                <circle cx="10" cy="10" r="20" fill="white" />
                <circle cx="90" cy="80" r="30" fill="white" />
            </svg>
        </div>
        
        <div class="max-w-4xl mx-auto text-center relative z-10">
            <h1 class="text-4xl font-extrabold mb-2">Internship Portal</h1>
            <p class="text-indigo-100 mb-8">Smart links pre-sorted for the newest roles.</p>
            
            <div class="grid grid-cols-1 md:grid-cols-12 gap-3 max-w-4xl mx-auto">
                <div class="md:col-span-6 relative">
                    <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"></i>
                    <input 
                        type="text" 
                        id="companySearch"
                        placeholder="Search companies..." 
                        class="w-full pl-12 pr-4 py-3 rounded-xl text-gray-900 focus:outline-none shadow-lg border-none"
                    >
                </div>
                <div class="md:col-span-3">
                    <select id="categoryFilter" class="w-full bg-white text-gray-900 px-4 py-3 rounded-xl font-medium focus:outline-none shadow-lg border-none">
                        <option value="all">All Categories</option>
                        <option value="Big Tech">Big Tech</option>
                        <option value="FinTech">FinTech</option>
                        <option value="AI & Software">AI & Software</option>
                        <option value="Retail/Other">Other</option>
                    </select>
                </div>
                <div class="md:col-span-3 flex gap-2">
                    <button id="openAddModal" class="flex-grow bg-white/20 hover:bg-white/30 text-white font-bold py-3 px-4 rounded-xl border border-white/30 transition-all shadow-lg">
                        <i class="fas fa-plus mr-2"></i>Add
                    </button>
                </div>
            </div>

            <!-- Toggles & Status -->
            <div class="mt-6 flex flex-wrap items-center justify-center gap-6 text-sm">
                <label class="inline-flex items-center cursor-pointer group">
                    <div class="relative">
                        <input type="checkbox" id="remoteOnly" class="sr-only peer">
                        <div class="w-10 h-5 bg-white/20 rounded-full peer peer-checked:bg-green-400 after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-full border border-white/30"></div>
                    </div>
                    <span class="ml-3 font-medium text-white">Remote Only</span>
                </label>
                <div class="h-4 w-[1px] bg-white/20 hidden md:block"></div>
                <div class="flex items-center gap-4 text-xs font-medium opacity-80">
                    <span class="flex items-center gap-1"><i class="fas fa-check-circle text-green-400"></i> Checked Today</span>
                    <span class="flex items-center gap-1"><i class="fas fa-history text-indigo-300"></i> Last Visit Tracked</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-6 -mt-6 pb-20">
        <div id="companyGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Cards -->
        </div>
        <div id="noResults" class="hidden text-center py-20">
            <i class="fas fa-search text-gray-300 text-6xl mb-4"></i>
            <h3 class="text-xl font-semibold text-gray-600">No matches found</h3>
            <p class="text-gray-400">Try adjusting your filters or add a new company.</p>
        </div>
    </main>

    <!-- Add Company Modal -->
    <div id="addModal">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">Add New Company</h2>
                <button id="closeAddModal" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="addCompanyForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Company Name</label>
                    <input type="text" id="newName" required placeholder="e.g. OpenAI" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Category</label>
                        <select id="newCategory" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none">
                            <option>Big Tech</option>
                            <option>FinTech</option>
                            <option>AI & Software</option>
                            <option>Retail/Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 mb-1">Domain (for logo)</label>
                        <input type="text" id="newDomain" placeholder="openai.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Career Page URL</label>
                    <input type="url" id="newUrl" required placeholder="https://company.com/careers" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none">
                </div>
                <div class="flex items-center gap-2 pt-2">
                    <input type="checkbox" id="newIsRemote" class="w-4 h-4 text-indigo-600 rounded">
                    <label for="newIsRemote" class="text-sm font-medium text-gray-700">Offers Remote Internships</label>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl mt-4 hover:bg-indigo-700 transition-colors shadow-lg">Save Company</button>
            </form>
        </div>
    </div>

    <script>
        // Initial core dataset
        const defaultCompanies = [
            { name: "Google", category: "Big Tech", logo: "google.com", url: "https://www.google.com/about/careers/applications/jobs/results/?q=intern&sort_by=newest", isRemote: true },
            { name: "Meta", category: "Big Tech", logo: "meta.com", url: "https://www.metacareers.com/jobs/?q=intern&sort_by=newest", isRemote: true },
            { name: "Amazon", category: "Big Tech", logo: "amazon.com", url: "https://www.amazon.jobs/en/search?base_query=intern&sort=recent", isRemote: true },
            { name: "Microsoft", category: "Big Tech", logo: "microsoft.com", url: "https://jobs.microsoft.com/us/en/search-results?keywords=intern&s=1", isRemote: true },
            { name: "Apple", category: "Big Tech", logo: "apple.com", url: "https://jobs.apple.com/en-us/search?search=intern&sort=relevance", isRemote: false },
            { name: "Stripe", category: "FinTech", logo: "stripe.com", url: "https://stripe.com/jobs/search?query=intern", isRemote: true },
            { name: "NVIDIA", category: "AI & Software", logo: "nvidia.com", url: "https://nvidia.wd5.myworkdayjobs.com/NVIDIAExternalCareerSite?q=intern", isRemote: true },
            { name: "Goldman Sachs", category: "FinTech", logo: "goldmansachs.com", url: "https://www.goldmansachs.com/careers/students/programs/", isRemote: false }
        ];

        // State Management
        let userCompanies = JSON.parse(localStorage.getItem('userCompanies')) || [];
        let visitHistory = JSON.parse(localStorage.getItem('visitHistory')) || {};

        const companyGrid = document.getElementById('companyGrid');
        const companySearch = document.getElementById('companySearch');
        const categoryFilter = document.getElementById('categoryFilter');
        const remoteOnly = document.getElementById('remoteOnly');
        const noResults = document.getElementById('noResults');

        // Modal Logic
        const openAddModal = document.getElementById('openAddModal');
        const closeAddModal = document.getElementById('closeAddModal');
        const addModal = document.getElementById('addModal');
        const addCompanyForm = document.getElementById('addCompanyForm');

        openAddModal.onclick = () => addModal.classList.add('active');
        closeAddModal.onclick = () => addModal.classList.remove('active');
        window.onclick = (e) => { if(e.target === addModal) addModal.classList.remove('active'); };

        function trackVisit(companyName) {
            const today = new Date().toISOString().split('T')[0];
            visitHistory[companyName] = today;
            localStorage.setItem('visitHistory', JSON.stringify(visitHistory));
            renderCompanies();
        }

        function renderCompanies() {
            const searchTerm = companySearch.value.toLowerCase();
            const category = categoryFilter.value;
            const remoteFilterActive = remoteOnly.checked;
            const today = new Date().toISOString().split('T')[0];
            
            const allCompanies = [...defaultCompanies, ...userCompanies];
            
            const filtered = allCompanies.filter(c => {
                const matchesSearch = c.name.toLowerCase().includes(searchTerm);
                const matchesCategory = category === 'all' || c.category === category;
                const matchesRemote = !remoteFilterActive || c.isRemote;
                return matchesSearch && matchesCategory && matchesRemote;
            });

            companyGrid.innerHTML = '';
            
            if (filtered.length === 0) {
                noResults.classList.remove('hidden');
            } else {
                noResults.classList.add('hidden');
                filtered.forEach(company => {
                    const lastVisitDate = visitHistory[company.name];
                    const visitedToday = lastVisitDate === today;
                    
                    const card = document.createElement('div');
                    card.className = `glass-card rounded-2xl p-6 flex flex-col items-center text-center border-2 ${visitedToday ? 'checked-today' : 'border-transparent'}`;
                    
                    card.innerHTML = `
                        <div class="relative w-20 h-20 bg-gray-100 rounded-xl mb-4 flex items-center justify-center overflow-hidden border border-gray-100 shadow-inner">
                            <img src="https://logo.clearbit.com/${company.logo}" alt="" class="w-12 h-12 object-contain" onerror="this.src='https://ui-avatars.com/api/?name=${company.name}&background=random'">
                            ${visitedToday ? '<div class="absolute top-0 right-0 bg-green-500 text-white p-1 rounded-bl-lg shadow-md"><i class="fas fa-check text-[10px]"></i></div>' : ''}
                        </div>
                        <div class="flex items-center gap-2 mb-1">
                            <h3 class="text-xl font-bold text-gray-800">${company.name}</h3>
                            ${company.isRemote ? '<i class="fas fa-globe-americas text-blue-400 text-xs" title="Remote Available"></i>' : ''}
                        </div>
                        <span class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest mb-4 px-3 py-1 bg-indigo-50 rounded-full">${company.category}</span>
                        
                        <div class="mt-auto w-full">
                            <p class="text-[10px] text-gray-400 mb-2 uppercase font-medium">
                                ${lastVisitDate ? `Last visit: ${lastVisitDate}` : 'Never checked'}
                            </p>
                            <a href="${company.url}" 
                               target="_blank" 
                               onclick="trackVisit('${company.name}')"
                               class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-xl transition-all flex items-center justify-center gap-2 group shadow-md"
                            >
                                <span>Go to Career Site</span>
                                <i class="fas fa-arrow-right text-xs group-hover:translate-x-1 transition-transform"></i>
                            </a>
                        </div>
                    `;
                    companyGrid.appendChild(card);
                });
            }
        }

        // Add Company Submission
        addCompanyForm.onsubmit = (e) => {
            e.preventDefault();
            const newComp = {
                name: document.getElementById('newName').value,
                category: document.getElementById('newCategory').value,
                logo: document.getElementById('newDomain').value || 'placeholder.com',
                url: document.getElementById('newUrl').value,
                isRemote: document.getElementById('newIsRemote').checked
            };
            
            userCompanies.push(newComp);
            localStorage.setItem('userCompanies', JSON.stringify(userCompanies));
            
            addCompanyForm.reset();
            addModal.classList.remove('active');
            renderCompanies();
        };

        // Event Listeners
        companySearch.addEventListener('input', renderCompanies);
        categoryFilter.addEventListener('change', renderCompanies);
        remoteOnly.addEventListener('change', renderCompanies);

        // Initial Render
        renderCompanies();
    </script>
</body>
</html>
